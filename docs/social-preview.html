<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; }
  .banner {
    width: 1280px;
    height: 640px;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #1a1230 70%, #2d1b4e 100%);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  /* Subtle grid pattern */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Glow behind the orb area */
  .glow {
    position: absolute;
    right: 160px;
    top: 50%;
    transform: translateY(-50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .left {
    flex: 1;
    padding: 60px 70px;
    z-index: 1;
  }
  .title {
    font-size: 72px;
    font-weight: 800;
    color: #f0f6fc;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 26px;
    color: #8b949e;
    font-weight: 400;
    line-height: 1.4;
    max-width: 560px;
    margin-bottom: 36px;
  }
  .tagline em {
    color: #c9d1d9;
    font-style: normal;
    font-weight: 600;
  }
  .gauge-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 18px;
  }
  .gauge-line {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.7;
  }
  .gauge-line.active {
    opacity: 1;
  }
  .orb { font-size: 20px; }
  .bar { letter-spacing: 1px; }
  .green { color: #3fb950; }
  .orange { color: #d29922; }
  .red { color: #f85149; }
  .pct { color: #8b949e; min-width: 40px; }
  .label { color: #484f58; font-size: 14px; }
  .right {
    width: 380px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .hero-img {
    height: 480px;
    border-radius: 16px;
    filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.3));
  }
  .badge {
    position: absolute;
    bottom: 40px;
    right: 50px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #484f58;
    font-size: 15px;
  }
  .badge span { color: #6e7681; }
  .plugin-badge {
    background: rgba(139, 92, 246, 0.12);
    border: 1px solid rgba(139, 92, 246, 0.25);
    color: #a78bfa;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="left">
    <div class="title">Remembrall</div>
    <div class="tagline">
      <em>Never lose context again.</em><br>
      Auto-saves your work when Claude Code's context window runs low.
    </div>
    <div class="gauge-row">
      <div class="gauge-line">
        <span class="orb">&#x1F52E;</span>
        <span class="bar green">[&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2591;&#x2591;]</span>
        <span class="pct green">80%</span>
      </div>
      <div class="gauge-line">
        <span class="orb">&#x1F52E;</span>
        <span class="bar orange">[&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;]</span>
        <span class="pct orange">50% &#x2726;</span>
      </div>
      <div class="gauge-line active">
        <span class="orb">&#x1F52E;</span>
        <span class="bar orange">[&#x2588;&#x2588;&#x2588;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;]</span>
        <span class="pct orange">28% &#x26A1;</span>
        <span class="label">&larr; /handoff &rarr; plan mode &rarr; fresh start</span>
      </div>
      <div class="gauge-line">
        <span class="orb">&#x1F480;</span>
        <span class="bar red">[&#x2588;&#x2588;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;]</span>
        <span class="pct red">15%</span>
        <span class="label">Obliviate!</span>
      </div>
    </div>
  </div>
  <div class="right">
    <img class="hero-img" src="remembrall-hero.png" alt="">
  </div>
  <div class="badge">
    <span class="plugin-badge">Claude Code Plugin</span>
    <span>&#x2022; Shell &#x2022; MIT</span>
  </div>
</div>
</body>
</html>
